name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Build site folder
        run: |
          mkdir -p _site
          rsync -a \
            --exclude .git \
            --exclude .github \
            --exclude .cursor \
            --exclude .githooks \
            --exclude _site \
            ./ _site/

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: _site
          branch: gh-pages
          clean: true
          single-commit: true
